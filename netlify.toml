# =============================================================================
# Netlify configuration for joe-tax-tool
# =============================================================================

[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["cheerio"]

# Friendly URL: /api/lookup → /.netlify/functions/lookup
[[redirects]]
  from = "/api/lookup"
  to = "/.netlify/functions/lookup"
  status = 200
